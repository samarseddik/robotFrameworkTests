name: Robot Framework Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout test repository
        uses: actions/checkout@v3

      - name: Checkout keyword library
        uses: actions/checkout@v3
        with:
          repository: samarseddik/robotFrameworkKeywords
          path: robotFrameworkKeywords

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install robotframework
          pip install robotframework-requests
          pip install -e robotFrameworkKeywords/

      - name: Run Logging Tests
        run: |
          robot --outputdir results/logging \
                logging/

      - name: Run API Tests
        run: |
          robot --outputdir results/api \
                api/

      - name: Upload Test Results
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: robot-framework-results
          path: results/
